<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Admin - Food Store</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <header>
    <nav>
      <h1>Food Store</h1>
      <a id="btn-logout" href="#">Cerrar Sesión</a>
    </nav>
  </header>

  <main>
    <h2>Panel de Administración</h2>

    <table border="2" id="tabla-productos">
      <thead>
        <tr>
          <th>ID</th>
          <th>Imagen</th>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th>Descripción</th>
        </tr>
      </thead>
      <tbody id="tbody-productos"></tbody>
    </table>

    <br><br>

    <h2>Agregar Producto</h2>
    <form id="form-admin">
      <label for="nombre">Nombre:</label><br>
      <input type="text" id="nombre" placeholder="Ej: Lomito Completo" required>
      <br><br>

      <label for="precio">Precio:</label><br>
      <input type="number" id="precio" required>
      <br><br>

      <label for="categoria">Categoría:</label><br>
      <select id="categoria" required>
        <option value="">Seleccione...</option>
        <option value="Hamburguesas">Hamburguesas</option>
        <option value="Pizzas">Pizzas</option>
        <option value="Papas Fritas">Papas Fritas</option>
        <option value="Bebidas">Bebidas</option>
      </select>
      <br><br>

      <label for="descripcion">Descripción:</label><br>
      <textarea id="descripcion" rows="4" cols="35" required></textarea>
      <br><br>

      <button type="submit">Guardar Producto</button>
    </form>
  </main>

  <footer>
    <p>Panel de Administración - Food Store v1.0</p>
  </footer>

  <script type="module" src="./admin.ts"></script>
</body>
</html>
