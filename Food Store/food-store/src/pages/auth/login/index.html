<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Iniciar Sesión</title>
<link rel="stylesheet" href="../../../css/login.css">
</head>
<body>
  <div class="contenedor-pagina">
    <div class="tarjeta-login">

      <h1 class="titulo">Food Store</h1>
      <p class="subtitulo">Iniciar Sesión</p>

      <form id="form-login">
        <div class="campo">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required>
        </div>

        <div class="campo">
          <label for="password">Contraseña:</label>
          <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
        </div>

        <button type="submit" class="btn-ingresar">Ingresar</button>
      </form>

      <p class="enlace-registro">
        ¿No tenés cuenta? <a href="../registro/index.html">Registrate acá</a>
      </p>

    </div>
  </div>

  <script type="module" src="./login.ts"></script>
</body>
</html>
